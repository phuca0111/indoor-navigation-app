global:
  resolve_timeout: 5m

route:
  receiver: provider-adapter
  group_by: [alertname, environment]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="critical"]
      receiver: provider-adapter
      repeat_interval: 30m

receivers:
  - name: provider-adapter
    webhook_configs:
      - url: http://alert-adapter:8080/v1/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, environment]
