<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Hệ Thống Bản Đồ Trong Nhà</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; text-align: center; }
        .success-msg { color: #27ae60; font-size: 14px; margin-top: 10px; text-align: center; }
        .validation-errors { background: #fdf2f2; border: 1px solid #e74c3c; border-radius: 6px; padding: 12px; margin-bottom: 15px; color: #e74c3c; font-size: 13px; }
        .validation-errors ul { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🗺️ Hệ Thống Bản Đồ Trong Nhà</h1>
            <p>Đăng ký tài khoản quản trị</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">👤 Họ và tên</label>
                <input type="text" id="fullName" placeholder="Nhập họ tên..." required>
            </div>

            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" placeholder="Nhập email..." required>
            </div>

            <div class="form-group">
                <label for="password">🔒 Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">🔒 Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu..." required>
            </div>

            <!-- Hiển thị lỗi validation -->
            <div id="validationErrors" class="validation-errors" style="display: none;">
                <strong>Vui lòng kiểm tra lại:</strong>
                <ul id="errorList"></ul>
            </div>

            <!-- Hiển thị thông báo thành công/lỗi -->
            <p id="message" class="success-msg" style="display: none;"></p>

            <button type="submit" class="btn-login">Đăng Ký</button>

            <p style="margin-top:15px; font-size:13px; color:#666; text-align:center;">
                Đã có tài khoản?
                <a href="index.html" style="color:#007AFF; text-decoration:none;">Đăng nhập</a>
            </p>
        </form>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
