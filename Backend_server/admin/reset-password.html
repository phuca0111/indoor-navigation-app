<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Hệ Thống Bản Đồ Trong Nhà</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Đặt lại mật khẩu</h1>
            <p>Nhập mật khẩu mới cho tài khoản</p>
        </div>

        <form id="resetForm">
            <input type="hidden" id="token">
            <div class="form-group">
                <label for="newPassword">Mật khẩu mới</label>
                <input type="password" id="newPassword" placeholder="Ít nhất 8 ký tự, hoa/thường/số/ký tự đặc biệt..." required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới..." required>
            </div>
            <button type="submit" class="btn-login">Đặt lại mật khẩu</button>
            <p style="text-align:center; margin-top:14px; font-size:13px;">
                <a href="index.html" style="color:#007AFF;">Quay lại đăng nhập</a>
            </p>
            <p id="message" class="error-msg" style="display:none;"></p>
        </form>
    </div>
    <script src="../js/reset-password.js"></script>
</body>
</html>
