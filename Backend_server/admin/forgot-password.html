<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Hệ Thống Bản Đồ Trong Nhà</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Quên mật khẩu</h1>
            <p>Nhập email tài khoản để nhận hướng dẫn đặt lại</p>
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Nhập email đã đăng ký..." required>
            </div>
            <button type="submit" class="btn-login">Gửi yêu cầu</button>
            <p style="text-align:center; margin-top:14px; font-size:13px;">
                <a href="index.html" style="color:#007AFF;">Quay lại đăng nhập</a>
            </p>
            <p id="message" class="error-msg" style="display:none;"></p>
            <p id="mailHint" style="display:none; margin-top:12px; font-size:13px; color:#555; line-height:1.45;">
                Nếu email tồn tại, hãy kiểm tra hộp thư (cả mục <strong>Spam</strong>) và mở liên kết đặt lại mật khẩu.
            </p>
            <div id="devTokenBox" style="display:none; margin-top:14px; padding:12px; background:#f5f7fa; border-radius:8px; font-size:13px;">
                <p style="margin:0 0 8px; color:#555;"><strong>Chế độ sandbox:</strong> chưa gửi email — dùng token bên dưới để test.</p>
                <code id="devToken" style="word-break:break-all; display:block; margin-bottom:10px;"></code>
                <a id="devResetLink" href="#" class="btn-login" style="display:inline-block; text-align:center; text-decoration:none;">Mở trang đặt lại mật khẩu</a>
            </div>
        </form>
    </div>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
