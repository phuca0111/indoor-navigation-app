<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Bản Đồ Trong Nhà</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- ==========================================
         TRANG ĐĂNG NHẬP (LOGIN PAGE)
         Đây là trang đầu tiên Admin nhìn thấy
    ========================================== -->

    <div class="login-container">
        <!-- Tiêu đề -->
        <div class="login-header">
            <h1>🗺️ Hệ Thống Bản Đồ Trong Nhà</h1>
            <p>Đăng nhập để quản lý bản đồ tòa nhà</p>
        </div>

        <!-- Form đăng nhập -->
        <form id="loginForm">
            <!-- Ô nhập Email -->
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" placeholder="Nhập email đăng nhập..." required>
            </div>

            <!-- Ô nhập Mật khẩu -->
            <div class="form-group">
                <label for="password">🔒 Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <!-- Nút Đăng nhập -->
            <button type="submit" class="btn-login">Đăng Nhập</button>

            <div id="googleLoginWrap" style="display:none; margin-top:14px;">
                <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
                    <span style="flex:1; height:1px; background:#e0e0e0;"></span>
                    <span style="font-size:12px; color:#888;">hoặc</span>
                    <span style="flex:1; height:1px; background:#e0e0e0;"></span>
                </div>
                <a id="btnGoogleLogin" href="/api/auth/google" class="btn-login" style="display:block; text-align:center; text-decoration:none; background:#fff; color:#333; border:1px solid #dadce0;">
                    Tiếp tục với Google
                </a>
            </div>

            <p style="text-align:center; margin-top:12px; font-size:13px;">
                <a href="forgot-password.html" style="color:#007AFF;">Quên mật khẩu?</a>
            </p>

            <!-- Lựa chọn đăng ký theo luồng SaaS -->
            <div style="margin-top:18px;">
                <p style="font-size:13px; color:#555; margin:0 0 10px;">Chưa có tài khoản? Bạn muốn:</p>
                <a href="/org-trial.html" class="btn-trial">Dùng thử miễn phí</a>
                <a href="/org-register.html" class="btn-org-register">Đăng ký tổ chức</a>
                <p style="font-size:12px; color:#999; margin:12px 0 0;">Đã thuộc tổ chức? <a href="register.html" style="color:#007AFF;">Đăng ký nhân sự vận hành</a></p>
            </div>

            <!-- Dòng hiển thị lỗi (ẩn mặc định, chỉ hiện khi sai mật khẩu) -->
            <p id="errorMessage" class="error-msg" style="display: none;"></p>
        </form>
    </div>

    <!-- Lôi file JS xử lý logic đăng nhập -->
    <script src="../js/login.js"></script>
</body>
</html>
