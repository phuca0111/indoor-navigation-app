user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  log_format json escape=json '{"time":"$time_iso8601","request_id":"$request_id",'
    '"remote_addr":"$remote_addr","method":"$request_method","uri":"$uri",'
    '"status":$status,"bytes":$body_bytes_sent,"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time"}';
  access_log /dev/stdout json;
  error_log /dev/stderr warn;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=per_ip:10m;
  client_body_timeout 15s;
  client_header_timeout 15s;
  keepalive_timeout 30s;
  send_timeout 30s;

  upstream backend {
    server api:5000;
    keepalive 32;
  }

  server {
    listen 8080 default_server;
    server_name _;
    client_max_body_size 10m;
    limit_conn per_ip 30;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; report-uri /api/csp-report" always;

    # Metrics chỉ nằm trên backend network cho Prometheus.
    location = /api/metrics { return 404; }

    location ~ ^/api/(auth|webhooks)/ {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Request-ID $request_id;
      proxy_read_timeout 60s;
    }

    location /api/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Request-ID $request_id;
      proxy_read_timeout 60s;
    }

    location /storage/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://minio:9000/;
      proxy_set_header Host minio:9000;
      proxy_hide_header Server;
      expires 1h;
      add_header Cache-Control "public, max-age=3600, immutable";
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Backend phục vụ cả WebEditor; fallback này giữ deep route phía client.
    location /editor/ {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Request-ID $request_id;
      error_page 404 = /editor/index.html;
    }

    location / {
      proxy_pass http://backend;
      include /etc/nginx/proxy_params;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Provider có thể mount file server TLS vào thư mục này khi có certificate.
  include /etc/nginx/tls-enabled/*.conf;
}
