global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: staging

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: indoor-nav-api
    metrics_path: /api/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: ["api:5000"]
